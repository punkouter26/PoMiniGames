name: Deploy to Azure

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build API
        run: dotnet build src/PoMiniGames/PoMiniGames/PoMiniGames.csproj --configuration Release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/PoMiniGames.Client/package-lock.json

      - name: Build Client
        env:
          VITE_GAME_URL_POBABYTOUCH: https://proud-pebble-00337fb0f.2.azurestaticapps.net
          VITE_GAME_URL_POFIGHT: https://gray-coast-079ec100f.2.azurestaticapps.net
        run: |
          cd src/PoMiniGames.Client
          npm ci
          npm run build

      - name: Publish API
        run: dotnet publish src/PoMiniGames/PoMiniGames/PoMiniGames.csproj -c Release -r linux-x64 --no-self-contained -o ./publish

      - name: Upload API Artifact
        uses: actions/upload-artifact@v5
        with:
          name: api-publish
          path: ./publish
          retention-days: 3

      - name: Upload Client Build
        uses: actions/upload-artifact@v5
        with:
          name: client-build
          path: ./src/PoMiniGames.Client/dist
          retention-days: 3

  deploy-services:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download API Artifact
        uses: actions/download-artifact@v5
        with:
          name: api-publish
          path: ./publish

      - name: Get App Service Name
        id: app-info
        shell: bash
        run: |
          APP_NAME=$(az resource list -g PoMiniGames \
            --resource-type "Microsoft.Web/sites" \
            --query "[?tags.'azd-service-name'=='api'].name" -o tsv 2>/dev/null || echo "")
          if [ -z "$APP_NAME" ]; then
            APP_NAME=$(az webapp list -g PoMiniGames --query "[0].name" -o tsv)
          fi
          if [ -z "$APP_NAME" ]; then
            echo "Error: App Service not found in PoMiniGames"
            exit 1
          fi
          echo "app-name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "API App Service: $APP_NAME"

      - name: Deploy API to App Service
        shell: bash
        run: |
          cd ./publish
          zip -r ../api-deploy.zip .
          cd ..
          az webapp deploy \
            --resource-group PoMiniGames \
            --name "${{ steps.app-info.outputs.app-name }}" \
            --src-path api-deploy.zip \
            --type zip

      - name: Download Client Build
        uses: actions/download-artifact@v5
        with:
          name: client-build
          path: ./client-build

      - name: Deploy Client to Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "client-build"
          skip_app_build: true
          output_location: ""

      - name: Health Check API
        shell: bash
        run: |
          APP_URL="https://${{ steps.app-info.outputs.app-name }}.azurewebsites.net"
          echo "Waiting for app to warm up..."
          sleep 20
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" --max-time 30 || echo "000")
            echo "Health check attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

